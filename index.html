<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單人美甲工作室 - 預約系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* 整體背景與字體顏色 */
        body {
            background-color: #F5EEF0;
            color: #5C4E54;
            font-family: 'Helvetica Neue', '微軟正黑體', Arial, sans-serif;
        }
        /* 預約表單的卡片設計 */
        .container {
            max-width: 600px;
        }
        .booking-card {
            background: #FFFFFF;
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(174, 139, 150, 0.15);
            padding: 30px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        /* 主標題 */
        h1, h2, h3 {
            color: #AE8B96;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
        }
        /* 輸入框質感優化 */
        .form-control, .form-select {
            border: 1px solid #E0D4D8;
            border-radius: 12px;
            padding: 12px;
            background-color: #FCFAFB;
            color: #5C4E54;
        }
        .form-control:focus, .form-select:focus {
            border-color: #C2A3AC;
            box-shadow: 0 0 0 0.25rem rgba(194, 163, 172, 0.25);
        }
        .form-label {
            font-weight: 600;
            color: #8A737A;
            margin-bottom: 8px;
        }
        /* 主要按鈕 */
        .btn-primary {
            background-color: #C2A3AC;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #B08E98 !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(176, 142, 152, 0.4);
        }
        /* 查詢按鈕 */
        .btn-outline-secondary {
            border-radius: 12px;
            border-color: #C2A3AC;
            color: #C2A3AC;
            font-weight: bold;
        }
        .btn-outline-secondary:hover {
            background-color: #C2A3AC;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="booking-card">
        <h2>✨ 預約美甲服務 ✨</h2>
        
        <form id="bookingForm">
            <div class="mb-3">
                <label class="form-label">您的姓名</label>
                <input type="text" class="form-control" id="userName" required placeholder="例如：王小明">
            </div>
            <div class="mb-3">
                <label class="form-label">聯絡電話</label>
                <input type="tel" class="form-control" id="userPhone" required placeholder="例如：0912345678">
            </div>
            <div class="mb-3">
                <label class="form-label">服務項目</label>
                <select class="form-select" id="serviceName">
                    <option value="單色凝膠">單色凝膠 (90分鐘)</option>
                    <option value="造型凝膠">造型凝膠 (120分鐘)</option>
                    <option value="卸甲續作">卸甲續作 (150分鐘)</option>
                    <option value="純卸甲">純卸甲 (40分鐘)</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="form-label">預約時間</label>
                <div class="row g-2">
                    <div class="col-6">
                        <input type="date" class="form-control" id="
