<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單人美甲工作室 - 預約系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcf4f4; }
        .booking-card { max-width: 500px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="booking-card">
        <h2 class="text-center mb-4" style="color: #d68080;">✨ 預約美甲服務 ✨</h2>
        
        <form id="bookingForm">
            <div class="mb-3">
                <label class="form-label">您的姓名</label>
                <input type="text" class="form-control" id="userName" required placeholder="例如：王小明">
            </div>
            <div class="mb-3">
                <label class="form-label">聯絡電話</label>
                <input type="tel" class="form-control" id="userPhone" required placeholder="例如：0912345678">
            </div>
            <div class="mb-3">
                <label class="form-label">服務項目</label>
                <select class="form-select" id="serviceName">
                    <option value="單色凝膠">單色凝膠 (90分鐘)</option>
                    <option value="造型凝膠">造型凝膠 (120分鐘)</option>
                    <option value="卸甲續作">卸甲續作 (150分鐘)</option>
                    <option value="純卸甲">純卸甲 (40分鐘)</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="form-label">預約時間</label>
                <div class="row g-2">
                    <div class="col-6">
                        <input type="date" class="form-control" id="bookingDate" required>
                    </div>
                    <div class="col-3">
                        <select class="form-select" id="bookingHour" required></select>
                    </div>
                    <div class="col-3">
                        <select class="form-select" id="bookingMinute" required></select>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn w-100" style="background-color: #d68080; color: white; font-weight: bold;">送出預約</button>
        </form>

        <div id="messageBox" class="mt-3 text-center fw-bold"></div>
    </div>

    <div class="booking-card mt-4">
        <h3 class="text-center mb-3" style="color: #6c757d;">🔍 查詢我的預約</h3>
        <div class="row g-2 mb-3">
            <div class="col-5">
                <input type="text" class="form-control" id="searchName" placeholder="您的姓名">
            </div>
            <div class="col-5">
                <input type="tel" class="form-control" id="searchPhone" placeholder="聯絡電話">
            </div>
            <div class="col-2">
                <button class="btn btn-outline-secondary w-100" type="button" id="searchBtn">查詢</button>
            </div>
        </div>
        <div id="searchResults" class="mt-3"></div>
    </div>

</div>

<style>
    /* 整體背景與字體顏色 */
    body {
        background-color: #F9F6F0; /* 溫柔奶茶底色 */
        color: #5A4A42; /* 深可可色字體，比純黑更有質感 */
        font-family: 'Helvetica Neue', '微軟正黑體', Arial, sans-serif;
    }
    /* 預約表單的卡片設計 */
    .container {
        max-width: 600px; /* 讓版面在電腦上看也不會太寬，像手機一樣精緻 */
    }
    form, .card {
        background: #FFFFFF;
        border: none;
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(186, 166, 150, 0.15); /* 淡淡的暖色陰影 */
        padding: 30px;
        margin-top: 40px;
        margin-bottom: 40px;
    }
    /* 主標題 */
    h1, h2, h3 {
        color: #B59882; /* 焦糖奶茶色 */
        font-weight: bold;
        text-align: center;
        margin-bottom: 25px;
    }
    /* 輸入框質感優化 */
    .form-control, .form-select {
        border: 1px solid #E6DCD3;
        border-radius: 12px;
        padding: 12px;
        background-color: #FCFAF8;
        color: #5A4A42;
    }
    /* 輸入框點擊時的光暈 */
    .form-control:focus, .form-select:focus {
        border-color: #D4B8A6;
        box-shadow: 0 0 0 0.25rem rgba(212, 184, 166, 0.25);
    }
    /* 標籤文字 (姓名、電話等) */
    .form-label {
        font-weight: 600;
        color: #8C7A6B;
        margin-bottom: 8px;
    }
    /* 主要按鈕 (送出預約) */
    .btn-primary {
        background-color: #D4B8A6;
        border: none;
        border-radius: 12px;
        padding: 14px 20px;
        font-weight: bold;
        font-size: 1.1rem;
        color: white;
        width: 100%;
        transition: all 0.3s ease; /* 讓動畫變滑順 */
    }
    /* 按鈕滑鼠移過去的互動效果 */
    .btn-primary:hover {
        background-color: #C3A592; /* 顏色變深 */
        transform: translateY(-2px); /* 輕微浮起動畫 */
        box-shadow: 0 6px 15px rgba(195, 165, 146, 0.4);
    }
</style>

</body>
</html>
