<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美甲後台 - 視覺化行事曆</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
        body { background-color: #F5EEF0; color: #5C4E54; font-family: 'Helvetica Neue', '微軟正黑體', Arial, sans-serif; padding: 20px; }
        .container { max-width: 1100px; }
        .dashboard-card { background: #FFFFFF; border-radius: 20px; box-shadow: 0 8px 24px rgba(174, 139, 150, 0.15); padding: 25px; }
        h2 { color: #AE8B96; font-weight: bold; text-align: center; margin-bottom: 25px; }
        :root {
            --fc-border-color: #EEDEE2;
            --fc-button-bg-color: #C2A3AC;
            --fc-button-border-color: #C2A3AC;
            --fc-button-hover-bg-color: #B08E98;
            --fc-button-active-bg-color: #B08E98;
            --fc-today-bg-color: #FCFAFB;
        }
        #calendar { background: white; padding: 10px; border-radius: 15px; min-height: 600px; }
        .fc-header-toolbar h2 { font-size: 1.5rem !important; color: #8A737A !important; }
        .fc-event-title { font-weight: bold; cursor: pointer; }
        .fc-v-event { border-radius: 6px; padding: 4px; border: none !important; }
        .color-hint { font-size: 0.9rem; margin-bottom: 15px; text-align: right; }
        .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-left: 15px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container" id="mainContent" style="display: none;">
    <div class="dashboard-card">
        <h2>👑 預約視覺化看板</h2>
        <div class="color-hint">
            <span class="dot" style="background-color: #AE8B96;"></span> 客人預約
            <span class="dot" style="background-color: #7A7A7A;"></span> 老闆行程 / 店休
        </div>
        <div id="calendar"></div>
    </div>
</div>

<script>
    const API_URL = "https://nail-booking-api-bx93.onrender.com";
    let calendar;

    window.onload = function() {
        Swal.fire({
            title: '老闆身分驗證',
            input: 'password',
            inputPlaceholder: '請輸入密碼',
            icon: 'lock',
            confirmButtonColor: '#C2A3AC',
            allowOutsideClick: false
        }).then((result) => {
            if (result.value === 'boss') {
                document.getElementById('mainContent').style.display = 'block';
                initCalendar();
            } else {
                location.reload();
            }
        });
    };

    function initCalendar() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
            buttonText: { today: '今天', month: '月', week: '週', day: '日' },
            
            eventClick: function(info) {
                const bookingId = info.event.id;
                const titleText = info.event.title;
                const isBoss = info.event.extendedProps.isBoss;
                
                let actionButtonHtml = '';
                if (bookingId) {
                    if (isBoss) {
                        actionButtonHtml = `<button class="btn btn-outline-danger w-100 mt-3 fw-bold" onclick="adminDeleteEvent('${bookingId}', '行程')">🔓 刪除此行程 / 恢復上班</button>`;
                    } else {
                        actionButtonHtml = `<button class="btn btn-danger w-100 mt-3 fw-bold" onclick="adminDeleteEvent('${bookingId}', '預約')">❌ 取消此客人的預約</button>`;
                    }
                }

                // 💡 項目詳情已拿掉，乾淨俐落顯示標題與時間
                Swal.fire({
                    title: isBoss ? '🔒 老闆休假狀態' : '💅 客人預約詳情',
                    html: `<div style="text-align: left;">
                            <b>項目名稱：</b>${titleText}<br>
                            ${isBoss ? '' : `<b>聯絡電話：</b>${info.event.extendedProps.phone}<br>`}
                            <b>時間設定：</b>${info.event.allDay ? info.event.start.toLocaleDateString('zh-TW') + ' (整天店休)' : info.event.start.toLocaleString('zh-TW')}
                           </div>
                           ${actionButtonHtml}`,
                    showConfirmButton: false,
                    showCancelButton: true,
                    cancelButtonText: '關閉視窗',
                    cancelButtonColor: '#C2A3AC'
                });
            },

            dateClick: async function(info) {
                let clickedDate = info.dateStr;
                let defaultHour = "08";
                if(clickedDate.includes("T")) {
                    const parts = clickedDate.split("T");
                    clickedDate = parts[0];
                    defaultHour = parts[1].substring(0, 2);
                }

                const { value: formValues } = await Swal.fire({
                    title: '🔒 設定休息 / 不開放預約',
                    html: `
                        <div class="text-start mb-2"><b>日期：</b>${clickedDate}</div>
                        <input id="swal-reason" class="swal2-input" style="margin: 10px 0;" placeholder="請輸入休假事由 (例如：特休、店休)">
                        <div class="text-start mt-2">
                            <label class="form-label"><b>時間選擇：</b></label>
                            <select id="swal-hour" class="form-select d-inline-block w-50">
                                <option value="all_day">✨ 整天不營業</option>
                                ${Array.from({length: 16}, (_, i) => i + 8).map(h => {
                                    let hStr = h.toString().padStart(2, '0');
                                    return `<option value="${hStr}" ${hStr===defaultHour && !info.dateStr.includes("all_day")?'selected':''}>${hStr} 點</option>`;
                                }).join('')}
                            </select>
                        </div>
                    `,
                    focusConfirm: false,
                    confirmButtonColor: '#C2A3AC',
                    showCancelButton: true,
                    cancelButtonText: '取消',
                    confirmButtonText: '確認鎖定',
                    preConfirm: () => {
                        return {
                            reason: document.getElementById('swal-reason').value || "店休",
                            hour: document.getElementById('swal-hour').value
                        }
                    }
                });

                if (formValues) {
                    const isAllDay = formValues.hour === "all_day";
                    const payload = {
                        // 💡 透過不同的文字前綴，讓系統辨識是「整天休息」還是「小時休息」
                        user_name: isAllDay ? `🔒 整天休息: ${formValues.reason}` : `🔒 休息: ${formValues.reason}`, 
                        user_phone: "0999999999", 
                        service_name: "單色凝膠", 
                        start_time: isAllDay ? `${clickedDate}T00:00:00` : `${clickedDate}T${formValues.hour}:00:00`
                    };

                    try {
                        const res = await fetch(`${API_URL}/bookings/`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        if(res.ok) {
                            Swal.fire({ icon: 'success', title: '已成功鎖定該時段！', confirmButtonColor: '#C2A3AC' });
                            calendar.refetchEvents();
                        } else {
                            let errorDetail = await res.text();
                            Swal.fire({ icon: 'error', title: '鎖定失敗', text: `系統拒絕原因：${errorDetail}` });
                        }
                    } catch (error) {
                        Swal.fire({ icon: 'error', title: '連線失敗' });
                    }
                }
            },
            events: fetchEvents
        });
        calendar.render();
    }

    async function fetchEvents(fetchInfo, successCallback, failureCallback) {
        try {
            const response = await fetch(`${API_URL}/bookings/`);
            const data = await response.json();
            
            const events = data.map(b => {
                const timeString = b.start_time || b.booking_time;
                const nameString = b.user_name || b.customer_name || "未知項目";
                const phoneString = b.user_phone || b.phone || "無";

                if (!timeString) return null;

                let startTime = new Date(timeString);
                let endTime = new Date(startTime.getTime() + 2 * 60 * 60 * 1000); 
                
                const isBoss = nameString.includes("🔒") || nameString.includes("休息");
                const isAllDay = nameString.includes("整天休息");

                // 💡 休假事由直接顯示在項目名稱上，去掉多餘贅字
                let displayTitle = nameString;
                if (isBoss) {
                    displayTitle = nameString.replace("🔒 整天休息: ", "🔒 ").replace("🔒 休息: ", "🔒 ");
                } else {
                    displayTitle = `💅 ${nameString} - ${b.service_name}`;
                }
                
                return {
                    id: b.id || b._id || "", 
                    title: displayTitle,
                    start: timeString,
                    end: isAllDay ? null : endTime.toISOString(),
                    allDay: isAllDay, // 讓 FullCalendar 漂亮填滿整天格子的關鍵
                    color: isBoss ? '#7A7A7A' : '#AE8B96',
                    extendedProps: { phone: phoneString, service: b.service_name, isBoss: isBoss }
                };
            }).filter(e => e !== null);
            successCallback(events);
        } catch (error) {
            failureCallback(error);
        }
    }

    window.adminDeleteEvent = async function(id, type) {
        Swal.close();
        const result = await Swal.fire({
            title: `確定要刪除這筆${type}嗎？`,
            text: type === '預約' ? '取消後無法復原。' : '刪除後，該時段將重新開放線上預約！',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#C2A3AC',
            confirmButtonText: '確認刪除',
            cancelButtonText: '保持原狀'
        });

        if (result.isConfirmed) {
            try {
                const res = await fetch(`${API_URL}/bookings/${id}`, { method: "DELETE" });
                if (res.ok) {
                    Swal.fire({ icon: 'success', title: `該${type}已成功刪除！`, confirmButtonColor: '#C2A3AC' });
                    calendar.refetchEvents();
                } else {
                    let errText = await res.text();
                    Swal.fire({ icon: 'error', title: '刪除失敗', text: `系統拒絕：${errText}`, confirmButtonColor: '#C2A3AC' });
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: '連線中斷', confirmButtonColor: '#C2A3AC' });
            }
        }
    };
</script>
</body>
</html>
