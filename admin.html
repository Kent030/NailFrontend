<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美甲後台 - 視覺化行事曆</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
        body {
            background-color: #F5EEF0;
            color: #5C4E54;
            font-family: 'Helvetica Neue', '微軟正黑體', Arial, sans-serif;
            padding: 20px;
        }
        .container { max-width: 1100px; }
        .dashboard-card {
            background: #FFFFFF;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(174, 139, 150, 0.15);
            padding: 25px;
        }
        h2 { color: #AE8B96; font-weight: bold; text-align: center; margin-bottom: 25px; }

        /* 行事曆專屬樣式修正 - 莫蘭迪粉化 */
        :root {
            --fc-border-color: #EEDEE2;
            --fc-button-bg-color: #C2A3AC;
            --fc-button-border-color: #C2A3AC;
            --fc-button-hover-bg-color: #B08E98;
            --fc-button-active-bg-color: #B08E98;
            --fc-event-bg-color: #AE8B96;
            --fc-event-border-color: #AE8B96;
            --fc-today-bg-color: #FCFAFB;
        }
        #calendar {
            background: white;
            padding: 10px;
            border-radius: 15px;
            min-height: 600px;
        }
        /* 讓行事曆文字變好看 */
        .fc-header-toolbar h2 { font-size: 1.5rem !important; color: #8A737A !important; }
        .fc-event-title { font-weight: bold; cursor: pointer; }
        .fc-v-event { border-radius: 6px; padding: 2px; }
    </style>
</head>
<body>

<div class="container" id="mainContent" style="display: none;">
    <div class="dashboard-card">
        <h2>👑 預約視覺化看板</h2>
        <div id="calendar"></div>
    </div>
</div>

<script>
    const API_URL = "https://nail-booking-api-bx93.onrender.com";
    let calendar;

    // 1. 登入機制
    window.onload = function() {
        Swal.fire({
            title: '老闆身分驗證',
            input: 'password',
            inputPlaceholder: '請輸入密碼',
            icon: 'lock',
            confirmButtonColor: '#C2A3AC',
            allowOutsideClick: false
        }).then((result) => {
            if (result.value === 'boss') {
                document.getElementById('mainContent').style.display = 'block';
                initCalendar(); // 密碼正確才初始化行事曆
            } else {
                location.reload();
            }
        });
    };

    // 2. 初始化行事曆
    function initCalendar() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth', // 預設顯示月曆
            locale: 'zh-tw',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay' // 增加切換週、日的功能
            },
            buttonText: {
                today: '今天',
                month: '月',
                week: '週',
                day: '日'
            },
            // 當點擊行程時，彈出詳細資訊
            eventClick: function(info) {
                Swal.fire({
                    title: info.event.title,
                    html: `<div style="text-align: left;">
                            <b>客人電話：</b>${info.event.extendedProps.phone}<br>
                            <b>預約時間：</b>${info.event.start.toLocaleString()}
                           </div>`,
                    icon: 'info',
                    confirmButtonColor: '#C2A3AC'
                });
            },
            events: fetchEvents // 這裡去雲端抓資料
        });
        calendar.render();
    }

    // 3. 去 Render 抓預約資料並轉換成行事曆格式
    async function fetchEvents(fetchInfo, successCallback, failureCallback) {
        try {
            const response = await fetch(`${API_URL}/bookings/`);
            const data = await response.json();
            
            // 將資料轉換成 FullCalendar 格式
            const events = data.map(b => {
                // 假設每次美甲大約 2 小時 (可以根據 service_name 調整)
                let startTime = new Date(b.booking_time);
                let endTime = new Date(startTime.getTime() + 2 * 60 * 60 * 1000); 

                return {
                    title: `💅 ${b.customer_name} - ${b.service_name}`,
                    start: b.booking_time,
                    end: endTime.toISOString(),
                    extendedProps: {
                        phone: b.phone
                    }
                };
            });
            successCallback(events);
        } catch (error) {
            console.error("抓取失敗:", error);
            failureCallback(error);
        }
    }
</script>
</body>
</html>
