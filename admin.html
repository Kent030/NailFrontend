<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美甲後台 - 視覺化行事曆</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
        body {
            background-color: #F5EEF0;
            color: #5C4E54;
            font-family: 'Helvetica Neue', '微軟正黑體', Arial, sans-serif;
            padding: 20px;
        }
        .container { max-width: 1100px; }
        .dashboard-card {
            background: #FFFFFF;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(174, 139, 150, 0.15);
            padding: 25px;
        }
        h2 { color: #AE8B96; font-weight: bold; text-align: center; margin-bottom: 25px; }

        :root {
            --fc-border-color: #EEDEE2;
            --fc-button-bg-color: #C2A3AC;
            --fc-button-border-color: #C2A3AC;
            --fc-button-hover-bg-color: #B08E98;
            --fc-button-active-bg-color: #B08E98;
            --fc-today-bg-color: #FCFAFB;
        }
        #calendar { background: white; padding: 10px; border-radius: 15px; min-height: 600px; }
        .fc-header-toolbar h2 { font-size: 1.5rem !important; color: #8A737A !important; }
        .fc-event-title { font-weight: bold; cursor: pointer; }
        .fc-v-event { border-radius: 6px; padding: 4px; border: none !important; }
        .color-hint { font-size: 0.9rem; margin-bottom: 15px; text-align: right; }
        .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-left: 15px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container" id="mainContent" style="display: none;">
    <div class="dashboard-card">
        <h2>👑 預約視覺化看板</h2>
        <div class="color-hint">
            <span class="dot" style="background-color: #AE8B96;"></span> 客人預約
            <span class="dot" style="background-color: #7A7A7A;"></span> 老闆行程 / 店休
        </div>
        <div id="calendar"></div>
    </div>
</div>

<script>
    const API_URL = "https://nail-booking-api-bx93.onrender.com";
    let calendar;

    window.onload = function() {
        Swal.fire({
            title: '老闆身分驗證',
            input: 'password',
            inputPlaceholder: '請輸入密碼',
            icon: 'lock',
            confirmButtonColor: '#C2A3AC',
            allowOutsideClick: false
        }).then((result) => {
            if (result.value === 'boss') {
                document.getElementById('mainContent').style.display = 'block';
                initCalendar();
            } else {
                location.reload();
            }
        });
    };

    function initCalendar() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            buttonText: { today: '今天', month: '月', week: '週', day: '日' },
            
            eventClick: function(info) {
                Swal.fire({
                    title: info.event.title,
                    html: `<div style="text-align: left;">
                            <b>詳情備註：</b>${info.event.extendedProps.service || '無'}<br>
                            <b>聯絡電話：</b>${info.event.extendedProps.phone}<br>
                            <b>開始時間：</b>${info.event.start.toLocaleString()}
                           </div>`,
                    icon: 'info',
                    confirmButtonColor: '#C2A3AC'
                });
            },

            dateClick: async function(info) {
                let clickedDate = info.dateStr;
                let defaultHour = "08";
                
                if(clickedDate.includes("T")) {
                    const parts = clickedDate.split("T");
                    clickedDate = parts[0];
                    defaultHour = parts[1].substring(0, 2);
                }

                const { value: formValues } = await Swal.fire({
                    title: '🔒 設定休息 / 不開放預約',
                    html: `
                        <div class="text-start mb-2"><b>日期：</b>${clickedDate}</div>
                        <input id="swal-reason" class="swal2-input" style="margin: 10px 0;" placeholder="請輸入休假事由 (例如：私人行程、店休)">
                        <div class="text-start mt-2">
                            <label class="form-label"><b>開始時間 (小時)：</b></label>
                            <select id="swal-hour" class="form-select d-inline-block w-50">
                                ${Array.from({length: 16}, (_, i) => i + 8).map(h => {
                                    let hStr = h.toString().padStart(2, '0');
                                    return `<option value="${hStr}" ${hStr===defaultHour?'selected':''}>${hStr} 點</option>`;
                                }).join('')}
                            </select>
                        </div>
                    `,
                    focusConfirm: false,
                    confirmButtonColor: '#C2A3AC',
                    showCancelButton: true,
                    cancelButtonText: '取消',
                    confirmButtonText: '確認鎖定',
                    preConfirm: () => {
                        return {
                            reason: document.getElementById('swal-reason').value || "老闆私人行程",
                            hour: document.getElementById('swal-hour').value
                        }
                    }
                });

                if (formValues) {
                    const payload = {
                        customer_name: "🔒 老闆休息",
                        phone: "0999999999", // 換成台灣格式的安全假電話
                        service_name: formValues.reason,
                        booking_time: `${clickedDate}T${formValues.hour}:00:00`
                    };

                    try {
                        const res = await fetch(`${API_URL}/bookings/`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        
                        // 🔍 重點：把後端的回應解碼出來看
                        const data = await res.json(); 
                        
                        if(res.ok) {
                            Swal.fire({ icon: 'success', title: '已成功鎖定該時段！', confirmButtonColor: '#C2A3AC' });
                            calendar.refetchEvents();
                        } else {
                            // 顯示真實的錯誤訊息，而不是我們自己亂寫的
                            let errorMessage = data.detail || '資料格式被系統拒絕';
                            Swal.fire({ 
                                icon: 'error', 
                                title: '鎖定失敗', 
                                text: `系統拒絕原因：${errorMessage}` 
                            });
                        }
                    } catch (error) {
                        Swal.fire({ icon: 'error', title: '連線失敗' });
                    }
                }
            },
            events: fetchEvents
        });
        calendar.render();
    }

    async function fetchEvents(fetchInfo, successCallback, failureCallback) {
        try {
            const response = await fetch(`${API_URL}/bookings/`);
            const data = await response.json();
            
            const events = data.map(b => {
                let startTime = new Date(b.booking_time);
                let endTime = new Date(startTime.getTime() + 2 * 60 * 60 * 1000);
                const isBoss = b.customer_name.includes("老闆");
                
                return {
                    title: isBoss ? `🔒 ${b.service_name}` : `💅 ${b.customer_name}`,
                    start: b.booking_time,
                    end: endTime.toISOString(),
                    color: isBoss ? '#7A7A7A' : '#AE8B96',
                    extendedProps: { phone: b.phone, service: b.service_name }
                };
            });
            successCallback(events);
        } catch (error) {
            failureCallback(error);
        }
    }
</script>
</body>
</html>
